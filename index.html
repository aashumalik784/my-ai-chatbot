<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Powered by Groq</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            --secondary-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --border-color: #2a2a3e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-purple);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar.collapsed {
            width: 0;
            border-right: none;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: var(--primary-gradient);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            padding: 12px 14px;
            margin-bottom: 8px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .chat-item:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--border-color);
            color: var(--text-primary);
        }

        .chat-item.active {
            background: var(--primary-gradient);
            color: white;
            border-color: var(--accent-purple);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        .settings-btn {
            width: 100%;
            padding: 10px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .settings-btn:hover {
            border-color: var(--accent-purple);
            background: rgba(139, 92, 246, 0.1);
        }

        .mobile-toggle {
            display: none;
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 101;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .welcome-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .welcome-title {
            font-size: 48px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            animation: slideUp 0.6s ease 0.1s both;
        }

        .welcome-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            animation: slideUp 0.6s ease 0.2s both;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 800px;
            animation: slideUp 0.6s ease 0.3s both;
        }

        .feature-card {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .feature-card:hover {
            border-color: var(--accent-purple);
            background: rgba(139, 92, 246, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.2);
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .feature-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .feature-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            border-radius: 12px;
            padding: 12px 16px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: var(--primary-gradient);
            color: white;
            border-radius: 18px 18px 4px 18px;
        }

        .message.ai .message-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 18px 18px 18px 4px;
        }

        .ai-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .code-block {
            background: #0a0a0f;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            margin: 8px 0;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(139, 92, 246, 0.05);
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .copy-btn {
            background: var(--accent-purple);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: var(--accent-blue);
        }

        .copy-btn.copied {
            background: var(--success);
        }

        .code-content {
            padding: 16px;
            overflow-x: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 16px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-purple);
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            40% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-dark);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .model-selector {
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            min-width: 140px;
        }

        .model-selector:hover {
            border-color: var(--accent-purple);
        }

        .textarea-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .message-input {
            width: 100%;
            min-height: 50px;
            max-height: 200px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            transition: all 0.2s ease;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--accent-purple);
            background: rgba(139, 92, 246, 0.05);
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: var(--primary-gradient);
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 13px;
            animation: slideUp 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .mobile-toggle {
                display: flex;
            }

            .sidebar {
                position: fixed;
                height: 100vh;
                left: 0;
                top: 0;
            }

            .sidebar.collapsed {
                left: -280px;
            }

            .main-content {
                width: 100%;
            }

            .messages-container {
                padding: 16px;
                padding-top: 60px;
            }

            .message-content {
                max-width: 85%;
            }

            .welcome-title {
                font-size: 32px;
            }

            .input-area {
                padding: 16px;
                flex-wrap: wrap;
            }

            .model-selector {
                width: 100%;
                margin-bottom: 8px;
            }

            .input-wrapper {
                width: 100%;
                flex-direction: column;
            }

            .message-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">
                    <span>➕</span>
                    <span>New Chat</span>
                </button>
            </div>
            <div class="chat-history" id="chatHistory"></div>
            <div class="sidebar-footer">
                <button class="settings-btn" id="settingsBtn">⚙️ Settings</button>
            </div>
        </div>

        <button class="mobile-toggle" id="mobileToggle">☰</button>

        <div class="main-content">
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-section" id="welcomeSection">
                    <h1 class="welcome-title">AI Chatbot</h1>
                    <p class="welcome-subtitle">Powered by Groq AI</p>
                    <div class="features-grid">
                        <div class="feature-card">
                            <div class="feature-icon">⚡</div>
                            <div class="feature-title">Lightning Fast</div>
                            <div class="feature-desc">Get instant responses powered by Groq</div>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">💬</div>
                            <div class="feature-title">Natural Chat</div>
                            <div class="feature-desc">Conversational AI that understands context</div>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">💻</div>
                            <div class="feature-title">Code Help</div>
                            <div class="feature-desc">Get programming assistance instantly</div>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">🔒</div>
                            <div class="feature-title">Private</div>
                            <div class="feature-desc">Your conversations stay private</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <select class="model-selector" id="modelSelector">
                        <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                        <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                        <option value="gemma-7b-it">Gemma 7B</option>
                    </select>
                    <div class="textarea-wrapper">
                        <textarea class="message-input" id="messageInput" placeholder="Type your message... (Shift+Enter for new line)" rows="1"></textarea>
                    </div>
                </div>
                <button class="send-btn" id="sendBtn" title="Send message">➤</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration - Uses Vercel serverless API
        const API_URL = window.location.origin + '/api';

        // DOM Elements
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelSelector = document.getElementById('modelSelector');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatHistory = document.getElementById('chatHistory');
        const sidebar = document.getElementById('sidebar');
        const mobileToggle = document.getElementById('mobileToggle');
        const welcomeSection = document.getElementById('welcomeSection');

        // State
        let currentChatId = null;
        let currentMessages = [];
        let isLoading = false;
        let allChats = {};

        // Initialize
        function init() {
            loadChatsFromStorage();
            setupEventListeners();
            autoResizeTextarea();
        }

        function setupEventListeners() {
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', handleKeyPress);
            messageInput.addEventListener('input', autoResizeTextarea);
            newChatBtn.addEventListener('click', startNewChat);
            mobileToggle.addEventListener('click', toggleSidebar);

            document.querySelectorAll('.feature-card').forEach(card => {
                card.addEventListener('click', () => {
                    messageInput.focus();
                });
            });
        }

        function autoResizeTextarea() {
            messageInput.style.height = '50px';
            const scrollHeight = messageInput.scrollHeight;
            messageInput.style.height = Math.min(scrollHeight, 200) + 'px';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        function closeSidebarMobile() {
            if (window.innerWidth <= 768) {
                sidebar.classList.add('collapsed');
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            if (!currentChatId) {
                startNewChat();
            }

            currentMessages.push({ role: 'user', content: message });
            addMessageToUI('user', message);

            messageInput.value = '';
            messageInput.style.height = '50px';
            isLoading = true;
            sendBtn.disabled = true;

            const typingId = addTypingIndicator();

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message,
                        history: currentMessages.slice(0, -1),
                        model: modelSelector.value,
                    }),
                });

                removeTypingIndicator(typingId);

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `API error: ${response.status}`);
                }

                const data = await response.json();
                const aiMessage = data.response;

                currentMessages.push({ role: 'assistant', content: aiMessage });
                addMessageToUI('ai', aiMessage);
                saveChatsToStorage();
                updateChatTitle();

            } catch (error) {
                removeTypingIndicator(typingId);
                showError(error.message || 'Failed to get response. Please try again.');
                currentMessages.pop();
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessageToUI(role, content) {
            if (welcomeSection && welcomeSection.parentElement === messagesContainer) {
                welcomeSection.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            if (role === 'ai') {
                const avatar = document.createElement('div');
                avatar.className = 'ai-avatar';
                avatar.textContent = 'AI';

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.innerHTML = formatMessage(content);

                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
            } else {
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = content;
                messageDiv.appendChild(contentDiv);
            }

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }

        function formatMessage(content) {
            let html = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                const language = lang || 'code';
                const trimmedCode = code.trim();
                return `<div class="code-block">
                    <div class="code-header">
                        <span>${language}</span>
                        <button class="copy-btn" onclick="copyCode(this)">📋 Copy</button>
                    </div>
                    <div class="code-content"><code>${trimmedCode}</code></div>
                </div>`;
            });

            html = html.replace(/`([^`]+)`/g, '<code style="background: rgba(139, 92, 246, 0.2); padding: 2px 6px; border-radius: 3px;">$1</code>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        window.copyCode = function(btn) {
            const codeContent = btn.closest('.code-block').querySelector('code').textContent;
            navigator.clipboard.writeText(codeContent).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✅ Copied';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        };

        function addTypingIndicator() {
            const id = 'typing-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.id = id;
            messageDiv.className = 'message ai';

            const avatar = document.createElement('div');
            avatar.className = 'ai-avatar';
            avatar.textContent = 'AI';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();

            return id;
        }

        function removeTypingIndicator(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = '❌ ' + message;
            messagesContainer.appendChild(errorDiv);
            scrollToBottom();

            setTimeout(() => errorDiv.remove(), 5000);
        }

        function scrollToBottom() {
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 0);
        }

        function startNewChat() {
            currentChatId = 'chat-' + Date.now();
            currentMessages = [];
            messagesContainer.innerHTML = '';
            messagesContainer.appendChild(welcomeSection.cloneNode(true));

            document.querySelectorAll('.feature-card').forEach(card => {
                card.addEventListener('click', () => {
                    messageInput.focus();
                });
            });

            messageInput.value = '';
            messageInput.style.height = '50px';
            renderChatHistory();
        }

        function updateChatTitle() {
            if (currentMessages.length > 0) {
                const firstMessage = currentMessages[0].content;
                const title = firstMessage.substring(0, 50);

                if (!allChats[currentChatId]) {
                    allChats[currentChatId] = {
                        id: currentChatId,
                        title: title,
                        messages: currentMessages,
                        timestamp: Date.now(),
                    };
                } else {
                    allChats[currentChatId].messages = currentMessages;
                }

                saveChatsToStorage();
                renderChatHistory();
            }
        }

        function loadChat(chatId) {
            if (allChats[chatId]) {
                currentChatId = chatId;
                currentMessages = [...allChats[chatId].messages];

                messagesContainer.innerHTML = '';

                currentMessages.forEach(msg => {
                    addMessageToUI(msg.role, msg.content);
                });

                renderChatHistory();
                closeSidebarMobile();
            }
        }

        function renderChatHistory() {
            chatHistory.innerHTML = '';

            const sortedChats = Object.values(allChats).sort((a, b) => b.timestamp - a.timestamp);

            sortedChats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.textContent = chat.title;
                item.addEventListener('click', () => loadChat(chat.id));
                chatHistory.appendChild(item);
            });
        }

        function saveChatsToStorage() {
            localStorage.setItem('chatbot-chats', JSON.stringify(allChats));
        }

        function loadChatsFromStorage() {
            const stored = localStorage.getItem('chatbot-chats');
            if (stored) {
                allChats = JSON.parse(stored);
                renderChatHistory();
            }
        }

        init();
    </script>
</body>
</html>
