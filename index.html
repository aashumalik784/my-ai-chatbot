<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Powered by Groq</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --border-color: #2a2a3e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }
        .container { display: flex; height: 100vh; }
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: var(--primary-gradient);
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin: 15px;
        }
        .chat-history { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item {
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .chat-item:hover { background: rgba(139, 92, 246, 0.1); }
        .chat-item.active { background: var(--primary-gradient); color: white; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .welcome-section {
            text-align: center;
            padding: 60px 20px;
        }
        .welcome-title {
            font-size: 48px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            max-width: 800px;
            margin: 40px auto;
        }
        .feature-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .feature-icon { font-size: 32px; margin-bottom: 12px; }
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .message.user { justify-content: flex-end; }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: var(--primary-gradient);
            color: white;
        }
        .message.ai .message-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }
        .ai-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .typing-indicator { display: flex; gap: 4px; padding: 8px; }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-purple);
            animation: bounce 1.4s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-dark);
        }
        .input-container {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }
        .model-selector {
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
        }
        .message-input {
            flex: 1;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            resize: none;
            min-height: 50px;
        }
        .message-input:focus { outline: none; border-color: var(--accent-purple); }
        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: var(--primary-gradient);
            color: white;
            cursor: pointer;
        }
        .send-btn:disabled { opacity: 0.5; }
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fca5a5;
            margin: 10px 0;
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="newChat()">➕ New Chat</button>
            <div class="chat-history" id="chatHistory"></div>
        </div>
        <div class="main-content">
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-section">
                    <h1 class="welcome-title">AI Chatbot</h1>
                    <p style="color: var(--text-secondary);">Powered by Groq AI</p>
                    <div class="features-grid">
                        <div class="feature-card">
                            <div class="feature-icon">⚡</div>
                            <h3>Lightning Fast</h3>
                            <p style="color: var(--text-secondary); font-size: 13px;">Get instant responses</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">💬</div>
                            <h3>Natural Chat</h3>
                            <p style="color: var(--text-secondary); font-size: 13px;">Conversational AI</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">💻</div>
                            <h3>Code Help</h3>
                            <p style="color: var(--text-secondary); font-size: 13px;">Programming assistance</p>
                        </div>
                        <div class="feature-card">
                            <div class="feature-icon">🔒</div>
                            <h3>Private</h3>
                            <p style="color: var(--text-secondary); font-size: 13px;">Your data is safe</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-container">
                    <select class="model-selector" id="modelSelector">
                        <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                        <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                        <option value="gemma2-9b-it">Gemma 2 9B</option>
                    </select>
                    <textarea class="message-input" id="messageInput" placeholder="Type your message..."></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let currentChatId = null;
        let currentMessages = [];
        let isLoading = false;
        let allChats = {};

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const model = document.getElementById('modelSelector').value;
            const message = input.value.trim();
            
            if (!message || isLoading) return;

            const welcome = document.querySelector('.welcome-section');
            if (welcome) welcome.remove();

            addMessage(message, 'user');
            input.value = '';
            showTyping();
            isLoading = true;

            fetch(API_URL + '/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, history: currentMessages, model })
            })
            .then(res => res.json())
            .then(data => {
                removeTyping();
                if (data.error) {
                    addMessage('Error: ' + data.error, 'ai');
                } else {
                    addMessage(data.response, 'ai');
                    currentMessages.push({ role: 'user', content: message });
                    currentMessages.push({ role: 'assistant', content: data.response });
                    saveChat();
                }
                isLoading = false;
            })
            .catch(err => {
                removeTyping();
                addMessage('Error: ' + err.message, 'ai');
                isLoading = false;
            });
        }

        function addMessage(content, sender) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message ' + sender;
            
            if (sender === 'ai') {
                div.innerHTML = '<div class="ai-avatar">AI</div><div class="message-content">' + formatMessage(content) + '</div>';
            } else {
                div.innerHTML = '<div class="message-content">' + content + '</div>';
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function formatMessage(text) {
            return text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                      .replace(/`([^`]+)`/g, '<code>$1</code>')
                      .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message ai';
            div.id = 'typing';
            div.innerHTML = '<div class="ai-avatar">AI</div><div class="message-content"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function saveChat() {
            if (!currentChatId) {
                currentChatId = 'chat-' + Date.now();
                allChats[currentChatId] = {
                    id: currentChatId,
                    title: currentMessages[0].content.substring(0, 30),
                    messages: currentMessages
                };
                localStorage.setItem('chats', JSON.stringify(allChats));
                renderHistory();
            }
        }

        function newChat() {
            currentChatId = null;
            currentMessages = [];
            document.getElementById('messagesContainer').innerHTML = `
                <div class="welcome-section">
                    <h1 class="welcome-title">AI Chatbot</h1>
                    <p style="color: var(--text-secondary);">Powered by Groq AI</p>
                    <div class="features-grid">
                        <div class="feature-card"><div class="feature-icon">⚡</div><h3>Lightning Fast</h3></div>
                        <div class="feature-card"><div class="feature-icon">💬</div><h3>Natural Chat</h3></div>
                        <div class="feature-card"><div class="feature-icon">💻</div><h3>Code Help</h3></div>
                        <div class="feature-card"><div class="feature-icon">🔒</div><h3>Private</h3></div>
                    </div>
                </div>
            `;
        }

        function renderHistory() {
            const history = document.getElementById('chatHistory');
            history.innerHTML = Object.values(allChats).map(chat => 
                '<div class="chat-item" onclick="loadChat(\'' + chat.id + '\')">' + chat.title + '</div>'
            ).join('');
        }

        function loadChat(id) {
            currentChatId = id;
            currentMessages = allChats[id].messages;
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            currentMessages.forEach(msg => {
                addMessage(msg.content, msg.role === 'assistant' ? 'ai' : 'user');
            });
        }

        // Load chats on startup
        const saved = localStorage.getItem('chats');
        if (saved) {
            allChats = JSON.parse(saved);
            renderHistory();
        }

        // Enter key to send
        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
    </html>
